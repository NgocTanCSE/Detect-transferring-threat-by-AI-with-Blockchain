version: '3.8'

services:
  # Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: blockchain_rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 20s
      timeout: 15s
      retries: 5
    networks:
      - blockchain_network

  # PostgreSQL - Main Database
  postgres_main:
    image: postgres:16-alpine
    container_name: blockchain_postgres_main
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: blockchain
      POSTGRES_PASSWORD: blockchain123
      POSTGRES_DB: blockchain_main
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U blockchain -d blockchain_main" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Redis - Caching Layer
  redis:
    image: redis:7-alpine
    container_name: blockchain_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # API Gateway (port 8001)
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: blockchain_api_gateway
    ports:
      - "8001:8001"
    depends_on:
      - auth-service
      - alert-service
      - wallet-service
      - transfer-service
      - analytics-service
      - compliance-service
      - event-service
      - ai-service
    environment:
      NODE_ENV: development
      PORT: 8001
      DATABASE_URL: postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_strong_random_secret}
      JWT_ALGORITHM: HS256
      AUTH_SERVICE_URL: http://auth-service:3001
      ALERT_SERVICE_URL: http://alert-service:3003
      WALLET_SERVICE_URL: http://wallet-service:3002
      TRANSFER_SERVICE_URL: http://transfer-service:3004
      ANALYTICS_SERVICE_URL: http://analytics-service:3005
      COMPLIANCE_SERVICE_URL: http://compliance-service:3006
      EVENT_SERVICE_URL: http://event-service:3007
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8001/health',(r)=>{if(r.statusCode!==200)process.exit(1)}).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Auth Service (port 3001)
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: blockchain_auth_service
    ports:
      - "3001:3001"
    depends_on:
      postgres_main:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_strong_random_secret}
      JWT_EXPIRY: 7d
    volumes: []
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3001/health',(r)=>{if(r.statusCode!==200)process.exit(1)}).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Alert Service (port 3003)
  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    container_name: blockchain_alert_service
    ports:
      - "3003:3003"
    depends_on:
      postgres_main:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3003/health',(r)=>{if(r.statusCode!==200)process.exit(1)}).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Wallet Service (port 3002)
  wallet-service:
    build:
      context: ./services/wallet-service
      dockerfile: Dockerfile
    container_name: blockchain_wallet_service
    ports:
      - "3002:3002"
    depends_on:
      postgres_main:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3002/health',(r)=>{if(r.statusCode!==200)process.exit(1)}).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Transfer Service (port 3004)
  transfer-service:
    build:
      context: ./services/transfer-service
      dockerfile: Dockerfile
    container_name: blockchain_transfer_service
    ports:
      - "3004:3004"
    depends_on:
      postgres_main:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      ANALYTICS_SERVICE_URL: http://analytics-service:3005
      ALERT_SERVICE_URL: http://alert-service:3003
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3004/health',(r)=>{if(r.statusCode!==200)process.exit(1)}).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Analytics Service (port 3005)
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: blockchain_analytics_service
    ports:
      - "3005:3005"
    depends_on:
      postgres_main:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PYTHONUNBUFFERED: 1
      PORT: 3005
      DATABASE_URL: postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      REDIS_URL: redis://redis:6379/0
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Compliance Service (port 3006)
  compliance-service:
    build:
      context: ./services/compliance-service
      dockerfile: Dockerfile
    container_name: blockchain_compliance_service
    ports:
      - "3006:3006"
    depends_on:
      postgres_main:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3006/health',(r)=>{if(r.statusCode!==200)process.exit(1)}).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Event Service (port 3007)
  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    container_name: blockchain_event_service
    ports:
      - "3007:3007"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3007
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3007/health',(r)=>{if(r.statusCode!==200)process.exit(1)}).on('error',()=>process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain_network

  # Traffic Generator for Demo
  traffic-generator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain_traffic_generator
    command: python /demo-scripts/sim_generate_traffic.py
    environment:
      - DATABASE_URL=postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
    volumes:
      - ./demo-scripts:/demo-scripts
    depends_on:
      postgres_main:
        condition: service_healthy
    networks:
      - blockchain_network

  # Scenario Injector for Demo (Tests blocking features)
  scenario-injector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain_scenario_injector
    command: python /demo-scripts/sim_inject_threats.py
    environment:
      - API_URL=http://api-gateway:8001
    volumes:
      - ./demo-scripts:/demo-scripts
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - blockchain_network

  # Autonomous Narrative Demo (Tests full functional flow)
  narrative-demo:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain_narrative_demo
    command: python /demo-scripts/sim_ai_sentinel_scenarios.py
    environment:
      - API_URL=http://api-gateway:8001
    volumes:
      - ./demo-scripts:/demo-scripts
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - blockchain_network

  # Evasion Prevention Simulation
  evasion-prevention-sim:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain_evasion_sim
    command: python /demo-scripts/sim_evasion_prevention.py
    environment:
      - API_URL=http://api-gateway:8001
    volumes:
      - ./demo-scripts:/demo-scripts
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - blockchain_network

  # Blacklist & IP Evasion Simulation
  blacklist-evasion-sim:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain_blacklist_evasion_sim
    command: python /demo-scripts/sim_ip_wallet_blacklist_evasion.py
    environment:
      - API_URL=http://api-gateway:8001
      - DATABASE_URL=postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
    volumes:
      - ./demo-scripts:/demo-scripts
    depends_on:
      api-gateway:
        condition: service_healthy
      postgres_main:
        condition: service_healthy
    networks:
      - blockchain_network

  # Scanner Service
  scanner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain_scanner_micro
    restart: always
    command: python /app/scanner.py
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      - ALERT_SERVICE_URL=http://alert-service:3003
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      postgres_main:
        condition: service_healthy
      alert-service:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - blockchain_network

  # AI Service (port 8000)
  ai-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain_ai_service
    restart: on-failure
    ports:
      - "8000:8000"
    command: /bin/sh -c "python bootstrap_supabase.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - ./database:/database
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://blockchain:blockchain123@postgres_main:5432/blockchain_main
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres_main:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - blockchain_network

  # Frontend Web UI
  frontend:
    build: ./frontend
    container_name: blockchain_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3007
      - NEXT_PUBLIC_SENDER_ADDRESS=${NEXT_PUBLIC_SENDER_ADDRESS:-0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb}
      - BACKEND_URL=http://api-gateway:8001
    depends_on:
      - api-gateway
    networks:
      - blockchain_network

volumes:
  postgres_main_data:
  rabbitmq_data:

networks:
  blockchain_network:
    driver: bridge
