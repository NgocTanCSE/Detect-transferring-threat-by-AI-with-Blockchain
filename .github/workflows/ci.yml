name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t blockchain-ai-sentinel .

      - name: Run Tests in Container
        run: |
          docker run --rm blockchain-ai-sentinel pytest /app/backend/tests
